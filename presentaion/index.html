<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Market Size Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="chart-panel" aria-labelledby="market-title">
        <div class="panel-heading">
          <p class="eyebrow">Global Autonomous Last Mile Delivery</p>
          <h1 id="market-title">Market Size</h1>
          <div class="cagr-badge" aria-label="CAGR 2025 to 2030 is 24.8 percent">
            <span>CAGR, 2025-2030</span>
            <span aria-hidden="true">&rarr;</span>
            <strong>24.8%</strong>
          </div>
        </div>

        <div class="bar-chart-wrap">
          <div class="y-axis" aria-hidden="true">
            <span>$6,819.6M</span>
            <span>$5,455.7M</span>
            <span>$4,091.8M</span>
            <span>$2,727.8M</span>
            <span>$1,363.9M</span>
            <span>$0.0M</span>
          </div>
          <div class="bar-chart" role="img" aria-label="Market size is 987.0 million dollars in 2021, 1,615.4 million dollars in 2024, and 5,930.2 million dollars in 2030.">
            <div class="grid-lines" aria-hidden="true"></div>
            <div class="bars" id="market-bars"></div>
          </div>
        </div>
      </section>

      <section class="chart-panel region-panel" aria-labelledby="region-title">
        <h2 id="region-title">Global Autonomous Last Mile Delivery Market Size, By Region</h2>
        <div class="region-chart" id="region-chart" aria-label="Regional stacked bars for 2024 and 2030"></div>
        <div class="legend" id="legend" aria-label="Region color legend"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
